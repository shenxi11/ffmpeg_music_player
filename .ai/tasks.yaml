  - task_id: "bugfix-playlist-current-track-display-mismatch"
    title: "Fix playlist row display mismatch when switching to another queued song"
    module: "playback-and-audio"
    owner_session: "codex/online-music-comments-v1"
    status: "review"
    depends_on:
      - "bugfix-playlist-queue-click-crash"
    files_expected:
      - "src/viewmodels/PlaybackViewModel*"
      - "src/ui/widgets/playback/play_widget.viewmodel_connections.cpp"
    acceptance:
      - "Switching to another queued song no longer makes the previous row text or cover appear to be replaced by the newly playing song."
      - "The playlist order remains unchanged when selecting an existing queued song; only the current-playing state moves."
    notes: "Implemented. PlaybackViewModel no longer emits a full playlist snapshot refresh on currentIndexChanged, the snapshot builder only applies current-track metadata when the row path actually matches the active track, and PlayWidget now pushes current-file-path state to the playlist immediately without rebuilding the list. Debug build passed and the app survived a short launch smoke test; manual playback-list regression is still needed."
    updated_at: "2026-04-18 00:40"
  - task_id: "bugfix-playlist-queue-click-crash"
    title: "Fix expanded-playback playlist click crash caused by QML delegate destruction"
    module: "playback-and-audio"
    owner_session: "codex/online-music-comments-v1"
    status: "review"
    depends_on:
      - "feature-playback-queue-redesign-from-draft"
    files_expected:
      - "src/ui/qml_bridge/playback/playlist_history_qml.h"
      - "qml/components/playback/PlaylistHistory.qml"
    acceptance:
      - "Clicking another song from the expanded-playback playlist no longer triggers a QML fatal about an object being destroyed while one of its signal handlers is in progress."
      - "The playlist panel no longer logs 'requestPaint is not a function' during current-track state updates."
    notes: "Implemented. Playlist queue actions are now deferred past the active QML click handler, full snapshot refreshes are queued from the QWidget bridge, and the cover-state canvas repaint path no longer calls parent.requestPaint(). Debug build passed and the app survived a short launch smoke test; manual interaction regression is still needed."
    updated_at: "2026-04-18 00:26"
